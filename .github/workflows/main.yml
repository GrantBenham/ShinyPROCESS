name: Deploy app to GitHub Pages (custom shinylive build)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: rstudio/shiny-workflows/setup-r-package@v1
        with:
          packages: |
            renv
            posit-dev/r-shinylive
            sessioninfo

      - name: Install app dependencies
        shell: Rscript {0}
        run: |
          pak::pak(
            unique(renv::dependencies(".")$Package)
          )

      - name: Build shinylive site with project export script
        shell: Rscript {0}
        run: |
          source("tools/export_shinylive.R")

      - name: Diagnostics (output size)
        shell: bash
        run: |
          echo "Top files in docs/"
          find docs -type f -printf "%s %p\n" | sort -nr | head -20
          echo
          if [ -f docs/app.json ]; then
            ls -lh docs/app.json
          else
            echo "docs/app.json not found" && exit 1
          fi

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
